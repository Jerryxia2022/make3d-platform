# Make3D baseline PrusaSlicer profile for Bambu Lab P1S.
# This profile is used for backend estimate tests only and is not a final production print profile.

printer_model = Bambu Lab P1S
printer_variant = 0.4
gcode_flavor = marlin2
bed_shape = 0x0,256x0,256x256,0x256
nozzle_diameter = 0.4
filament_diameter = 1.75

layer_height = 0.2
first_layer_height = 0.2
fill_density = 50%
fill_pattern = grid
perimeters = 2
top_solid_layers = 5
bottom_solid_layers = 4

support_material = 0
brim_width = 0

temperature = 220
first_layer_temperature = 220
bed_temperature = 60
first_layer_bed_temperature = 60
fan_always_on = 1
cooling = 1
